name: Push Database Schema

on:
  workflow_dispatch:

jobs:
  push-schema:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Push Schema on droplet
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'EOF'
            export DOTENV_PRIVATE_KEY_PRODUCTION='${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}'
            cd /home/${{ secrets.SSH_USER }}/app

            # Fast dotenvx run helper
            run_dotenvx() {
              if command -v dotenvx >/dev/null 2>&1; then
                dotenvx run -f .env.production -- "$@"
              else
                npx @dotenvx/dotenvx@latest run -f .env.production -- "$@"
              fi  
            }

            run_dotenvx bash -c '
              echo "Waiting for database container..."
              until docker exec pimp-db-prod pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; do
                sleep 1
              done

              echo "Pushing database schema via Drizzle..."
              docker exec -i pimp-app-prod bunx drizzle-kit push --force
              echo "Schema pushed successfully!"
            '
          EOF
