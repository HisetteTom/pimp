name: Seed Production Database

on:
  workflow_dispatch:

jobs:
  seed-db:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Seed Scripts
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /home/${{ secrets.SSH_USER }}/app"
          scp -r scripts ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/app/

      - name: Copy and Execute Seeding inside App Container
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'EOF'
            set -e
            export DOTENV_PRIVATE_KEY_PRODUCTION='${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}'
            cd /home/${{ secrets.SSH_USER }}/app

            # Fast dotenvx run helper
            run_dotenvx() {
              if command -v dotenvx >/dev/null 2>&1; then
                dotenvx run -f .env.production -- "$@"
              else
                npx @dotenvx/dotenvx@latest run -f .env.production -- "$@"
              fi  
            }

            run_dotenvx bash -c '
              set -e
              echo "Waiting for database container..."
              until docker exec pimp-db-prod pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; do
                sleep 1
              done

              echo "Ensuring tables exist by pushing database schema..."
              docker exec -i pimp-app-prod bunx drizzle-kit push --force

              echo "Copying seed scripts into pimp-app-prod container..."
              docker cp /home/${{ secrets.SSH_USER }}/app/scripts pimp-app-prod:/app/scripts

              echo "Running seed script inside container..."
              docker exec -i pimp-app-prod bun /app/scripts/seed-data.ts
              echo "Database seeding completed successfully!"
            '
          EOF
