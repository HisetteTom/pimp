name: Deploy to Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.editorconfig'
      - '.prettier*'
      - 'react-doctor.config.json'
      - '.github/workflows/react-doctor.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Lowercase Repository Owner
        id: prep
        run: |
          echo "owner=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.owner }}/pimp-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Lowercase Repository Owner
        id: prep
        run: |
          echo "owner=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Compose and Env files
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p /home/${{ secrets.SSH_USER }}/app"
          scp compose.prod.yaml .env.production ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/app/
          if [ -d drizzle ]; then
            scp -r drizzle ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/app/
          fi

      - name: Deploy Container
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' << 'EOF'
            export DOTENV_PRIVATE_KEY_PRODUCTION='${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}'
            export IMAGE_NAME='${{ steps.prep.outputs.owner }}/pimp-app:latest'
            
            # Login to GHCR on droplet using dynamic temp token from actions
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Run docker compose pulling latest and restarting
            cd /home/${{ secrets.SSH_USER }}/app
            
            # Fast dotenvx run helper (uses global if present, otherwise falls back to npx)
            run_dotenvx() {
              if command -v dotenvx >/dev/null 2>&1; then
                dotenvx run -f .env.production -- "$@"
              else
                npx @dotenvx/dotenvx@latest run -f .env.production -- "$@"
              fi
            }
            
            run_dotenvx docker compose -f compose.prod.yaml pull
            run_dotenvx docker compose -f compose.prod.yaml up -d --remove-orphans
            
            # Wipe DB, apply Drizzle schema, and seed owner via pure PostgreSQL
            run_dotenvx bash -c '
              echo "Waiting for database to be ready..."
              until docker exec pimp-db-prod pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; do
                sleep 1
              done

              echo "Wiping database schema..."
              docker exec -i pimp-db-prod psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

              if [ -d drizzle ]; then
                echo "Applying SQL schema..."
                cat drizzle/*.sql | docker exec -i pimp-db-prod psql -U "$POSTGRES_USER" -d "$POSTGRES_DB"
              fi

              echo "Seeding owner admin..."
              USER_ID=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || echo "00000000-0000-0000-0000-000000000001")
              ACCOUNT_ID=$(cat /proc/sys/kernel/random/uuid 2>/dev/null || echo "00000000-0000-0000-0000-000000000002")

              docker exec -i pimp-db-prod psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" <<EOF
              CREATE EXTENSION IF NOT EXISTS pgcrypto;

              INSERT INTO "user" (id, name, email, email_verified, role, username, created_at, updated_at) 
              VALUES ('$USER_ID', 'Owner Admin', '$SEED_ADMIN_EMAIL', true, 'admin', 'owner', NOW(), NOW())
              ON CONFLICT (email) DO NOTHING;

              INSERT INTO "account" (id, account_id, provider_id, user_id, password, created_at, updated_at) 
              VALUES ('$ACCOUNT_ID', '$USER_ID', 'credential', '$USER_ID', crypt('$SEED_ADMIN_PASSWORD', gen_salt('bf')), NOW(), NOW())
              ON CONFLICT (id) DO NOTHING;
              EOF
            '
            
            # Logout
            docker logout ghcr.io
          EOF


