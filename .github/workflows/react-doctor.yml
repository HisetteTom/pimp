name: React Doctor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run React Doctor
        id: doctor
        run: |
          # Use --project pimp to avoid prompts
          # Use --score to get just the number
          # We use tail -n 1 to grab the very last line
          RAW_SCORE=$(bunx react-doctor@latest . --project pimp --score --fail-on none | tail -n 1 | tr -d '[:space:]')
          
          # Clean score: remove non-numeric chars (handles "Score: 85" or similar)
          SCORE=$(echo "$RAW_SCORE" | sed 's/[^0-9]//g')
          
          if [ -z "$SCORE" ]; then
            echo "Error: Could not capture score. Raw output: $RAW_SCORE"
            echo "score=0" >> "$GITHUB_OUTPUT"
          else
            echo "Captured Score: $SCORE"
            echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          fi
      - name: Update README Health Score Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SCORE=${{ steps.doctor.outputs.score }}
          
          # Default to grey if score is missing or invalid
          COLOR="lightgrey"
          if [[ "$SCORE" =~ ^[0-9]+$ ]]; then
            if [ "$SCORE" -gt 85 ]; then COLOR="brightgreen";
            elif [ "$SCORE" -gt 70 ]; then COLOR="green";
            elif [ "$SCORE" -gt 50 ]; then COLOR="yellow";
            elif [ "$SCORE" -gt 25 ]; then COLOR="orange";
            else COLOR="red"; fi
          else
            SCORE="0"
            COLOR="red"
          fi
          
          # Replace the badge line in README
          BADGE="[![Health Score](https://img.shields.io/badge/React_Doctor-$SCORE%2F100-$COLOR)](https://github.com/millionco/react-doctor)"
          sed -i "s|\[!\[Health Score\].*|${BADGE} <!-- DOCTOR_BADGE_START --><!-- DOCTOR_BADGE_END -->|g" README.md
      - name: Commit changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update react-doctor health score [skip ci]"
          file_pattern: 'README.md'