name: React Doctor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run React Doctor
        id: doctor
        run: |
          # Run full scan for report
          REPORT=$(bunx react-doctor@latest . --fail-on none)
          # Escape for output
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Get numeric score
          SCORE=$(bunx react-doctor@latest . --score | tail -n 1 | tr -d '[:space:]')
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Post/Update PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = "${{ steps.doctor.outputs.score }}";
            const report = `${{ steps.doctor.outputs.report }}`.trim();
            const body = `### ｩｺ React Doctor Report\n\n**Health Score: ${score}/100**\n\n<details>\n<summary>View Details</summary>\n\n\`\`\`\n${report}\n\`\`\`\n\n</details>`;
            
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const botComment = comments.find(c => c.body.includes('ｩｺ React Doctor Report'));
            
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Update README Health Score Badge
        if: github.event_name == 'push'
        run: |
          SCORE=${{ steps.doctor.outputs.score }}
          COLOR="lightgrey"
          if [[ "$SCORE" =~ ^[0-9]+$ ]]; then
            if [ "$SCORE" -gt 85 ]; then COLOR="brightgreen";
            elif [ "$SCORE" -gt 70 ]; then COLOR="green";
            elif [ "$SCORE" -gt 50 ]; then COLOR="yellow";
            elif [ "$SCORE" -gt 25 ]; then COLOR="orange";
            else COLOR="red"; fi
          else
            SCORE="?"
          fi
          
          BADGE="[![Health Score](https://img.shields.io/badge/React_Doctor-$SCORE%2F100-$COLOR)](https://github.com/millionco/react-doctor)"
          sed -i "s|\[!\[Health Score\].*|${BADGE} <!-- DOCTOR_BADGE_START --><!-- DOCTOR_BADGE_END -->|g" README.md

      - name: Commit changes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update react-doctor health score [skip ci]"
          file_pattern: 'README.md'
