name: React Doctor

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write
  pull-requests: write

jobs:
  doctor:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run React Doctor
        id: doctor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        run: |
          # Run react-doctor and save human-readable report
          bun x react-doctor@latest . --project pimp --fail-on none -y > report.txt 2>&1

          # Run with --json to temp file
          bun x react-doctor@latest . --project pimp --json -y > raw_result.json 2>&1

          echo "--- RAW RESULT START ---"
          cat raw_result.json
          echo "--- RAW RESULT END ---"

          # Extract only the JSON part
          sed -n '/{/,$p' raw_result.json > result.json

          echo "--- EXTRACTED JSON START ---"
          cat result.json
          echo "--- EXTRACTED JSON END ---"

          # Extract score with fallback paths
          SCORE=$(jq '.summary.score // .projects[0].score.score // 0' result.json)
          echo "score=$SCORE" >> $GITHUB_OUTPUT

          # Prepare clean report for PR comment
          REPORT=$(sed -n '/react-doctor/,$p' report.txt || cat report.txt)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Captured Score: $SCORE"


      - name: Post/Update PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DOCTOR_SCORE: ${{ steps.doctor.outputs.score }}
          DOCTOR_REPORT: ${{ steps.doctor.outputs.report }}
        with:
          script: |
            const score = parseInt(process.env.DOCTOR_SCORE) || 0;
            const report = process.env.DOCTOR_REPORT || "";
            const body = `### React Doctor Report\n\n**Health Score: ${score}/100**\n\n<details>\n<summary>View Details</summary>\n\n\`\`\`\n${report}\n\`\`\`\n\n</details>`;
            
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const botComment = comments.find(c => c.body.includes('### React Doctor Report'));
            
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Update README Health Score Badge
        if: github.event_name == 'push'
        run: |
          SCORE=${{ steps.doctor.outputs.score }}
          COLOR="lightgrey"
          if [[ "$SCORE" =~ ^[0-9]+$ ]]; then
            if [ "$SCORE" -gt 85 ]; then COLOR="brightgreen";
            elif [ "$SCORE" -gt 70 ]; then COLOR="green";
            elif [ "$SCORE" -gt 50 ]; then COLOR="yellow";
            elif [ "$SCORE" -gt 25 ]; then COLOR="orange";
            else COLOR="red"; fi
          else
            SCORE="0"
          fi
          
          # Use Shields.io endpoint or simple badge. 
          # Spaces should be underscores or %20. React_Doctor is fine.
          # Slashes in message must be encoded as %2F.
          BADGE="[![Health Score](https://img.shields.io/badge/React_Doctor-${SCORE}%2F100-${COLOR})](https://github.com/millionco/react-doctor)"
          
          # Replace the badge line in README.md
          # Match the existing badge line and swap it.
          sed -i "s@\[\!\[Health Score\].*@${BADGE} <!-- DOCTOR_BADGE_START --><!-- DOCTOR_BADGE_END -->@g" README.md

      - name: Commit changes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update react-doctor health score [skip ci]"
          file_pattern: 'README.md'
