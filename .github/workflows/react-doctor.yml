name: React Doctor

on:
  push:
    branches: ["*"]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run React Doctor Script
        run: bun run scripts/react-doctor-report.ts

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update react-doctor health score [skip ci]"
          file_pattern: 'README.md .github/badges/react-doctor.json'
